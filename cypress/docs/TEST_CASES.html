<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - E2E Test Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script>
    if (!window.jspdf) {
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js';
      document.head.appendChild(s);
    }
  </script>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1b2e;
      color: #d4d8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1a1b2e; }
    ::-webkit-scrollbar-thumb { background: #353860; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4f80; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #222540 0%, #1e2040 100%);
      border-bottom: 1px solid #353860;
      padding: 20px 28px;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e8ecff;
      letter-spacing: -0.4px;
    }
    .header h1 span { color: #6c7bf0; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .server-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 600; padding: 5px 14px;
      border-radius: 20px; background: #2d3050; border: 1px solid #353860;
    }
    .server-status.online { color: #4ade80; border-color: #2a5a3a; background: #1a3a2a; }
    .server-status.offline { color: #f87171; border-color: #5a2020; background: #3a1a1a; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .status-dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .status-dot.offline { background: #f87171; box-shadow: 0 0 6px #f87171; }

    /* ── Buttons ───────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-primary { background: #6c7bf0; color: #fff; }
    .btn-primary:hover { background: #5a69e0; transform: translateY(-1px); }
    .btn-secondary { background: #2d3050; color: #8890b5; border: 1px solid #353860; }
    .btn-secondary:hover { background: #353860; color: #d4d8f0; }
    .btn-danger { background: #5a2020; color: #f87171; border: 1px solid #7a3030; }
    .btn-danger:hover { background: #7a3030; color: #fca5a5; }
    .btn-run {
      background: #1a3a2a;
      color: #4ade80;
      border: 1px solid #2a5a3a;
      font-size: 0.76rem;
      padding: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-run:hover { background: #2a5a3a; color: #86efac; }
    .btn-run.running { background: #3a2f1a; color: #fbbf24; border-color: #6b5520; cursor: wait; }
    .btn-run.done-ok { background: #1a3a2a; color: #4ade80; border-color: #2a7a4a; }
    .btn-run.done-fail { background: #3a1a1a; color: #f87171; border-color: #7a3030; }
    .btn-run-headless {
      background: #222540;
      color: #6c7bf0;
      border: 1px solid #4a4f80;
      font-size: 0.76rem;
      padding: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-run-headless:hover { background: #353860; color: #8b9af5; }
    .btn-run-headless.running { background: #3a2f1a; color: #fbbf24; border-color: #6b5520; cursor: wait; }
    .btn-run-headless.done-ok { background: #1a3a2a; color: #4ade80; border-color: #2a7a4a; }
    .btn-run-headless.done-fail { background: #3a1a1a; color: #f87171; border-color: #7a3030; }

    /* ── Stats Row ─────────────────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 12px;
      padding: 12px 22px;
      text-align: center;
      min-width: 95px;
      transition: transform 0.2s ease;
    }
    .stat-box:hover { transform: translateY(-2px); }
    .stat-box .num { font-size: 1.8rem; font-weight: 700; color: #6c7bf0; }
    .stat-box .lbl {
      font-size: 0.7rem;
      color: #8890b5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }
    .stat-box.pass .num { color: #4ade80; }
    .stat-box.fail .num { color: #f87171; }

    /* ── Tab Bar ───────────────────────────────────────────────────────────── */
    .tab-bar {
      background: #1e2040;
      border-bottom: 1px solid #353860;
      padding: 10px 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: #8890b5;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .tab-btn:hover { background: #2d3050; color: #d4d8f0; }
    .tab-btn.active {
      background: #222540;
      color: #6c7bf0;
      border-bottom: 2px solid #6c7bf0;
    }
    .tab-badge {
      background: #353860;
      color: #8890b5;
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 700;
    }
    .tab-btn.active .tab-badge {
      background: #6c7bf0;
      color: #fff;
    }

    /* ── Split Layout ──────────────────────────────────────────────────────── */
    .main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .left-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      min-width: 0;
    }
    .right-panel {
      width: 50%;
      min-width: 380px;
      background: #222540;
      border-left: 1px solid #353860;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .log-header {
      padding: 14px 18px;
      background: #1e2040;
      border-bottom: 1px solid #353860;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .log-header h3 {
      font-size: 0.9rem;
      color: #d4d8f0;
      font-weight: 600;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #8890b5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-body .log-pass { color: #4ade80; }
    .log-body .log-fail { color: #f87171; }
    .log-body .log-info { color: #6c7bf0; }
    .log-body .log-warn { color: #fbbf24; }
    .log-body .log-bold { font-weight: 700; color: #d4d8f0; }

    /* ── Progress Bar ──────────────────────────────────────────────────────── */
    .progress-bar-container {
      height: 6px;
      background: #1a1b2e;
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 18px;
      display: none;
      flex-shrink: 0;
    }
    .progress-bar-container.visible { display: block; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6c7bf0, #4ade80);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── Tab Content ───────────────────────────────────────────────────────── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── File Table ────────────────────────────────────────────────────────── */
    .file-table-card {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 12px;
      overflow: hidden;
    }
    .file-table {
      width: 100%;
      border-collapse: collapse;
    }
    .file-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 0.7rem;
      color: #8890b5;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      background: #1e2040;
      border-bottom: 1px solid #353860;
    }
    .file-table td {
      padding: 12px 16px;
      font-size: 0.84rem;
      border-bottom: 1px solid rgba(53, 56, 96, 0.4);
      color: #d4d8f0;
      vertical-align: middle;
    }
    .file-table tr:last-child td { border-bottom: none; }
    .file-table tr:hover td { background: rgba(108, 123, 240, 0.04); }
    .file-table .col-num { width: 45px; text-align: center; color: #8890b5; font-weight: 600; }
    .file-table .col-db { width: 100px; text-align: center; }
    .file-table .col-status { width: 110px; text-align: center; }
    .file-table .col-actions { width: 180px; text-align: center; white-space: nowrap; }
    .file-table .col-actions .btn-run,
    .file-table .col-actions .btn-run-headless { margin: 0 3px; }
    .file-name { font-weight: 600; }

    /* ── Status Badges ─────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge:hover { transform: scale(1.05); }
    .badge-notrun { background: #2d3050; color: #8890b5; }
    .badge-pass { background: #1a3a2a; color: #4ade80; }
    .badge-fail { background: #3a1a1a; color: #f87171; }
    .badge-blocked { background: #3a2f1a; color: #fbbf24; }
    .badge-skip { background: #2d3050; color: #6c7bf0; }

    .db-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    .db-yes { background: #1a3a2a; color: #4ade80; }
    .db-no { background: #2d3050; color: #8890b5; }

    /* ── Reports Tab ───────────────────────────────────────────────────────── */
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .report-card {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .report-card:hover { border-color: #6c7bf0; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .report-card.selected { border-color: #6c7bf0; background: #2a2d55; }
    .report-card .rc-title { font-size: 0.85rem; font-weight: 600; color: #d4d8f0; margin-bottom: 6px; }
    .report-card .rc-time { font-size: 0.72rem; color: #8890b5; margin-bottom: 8px; }
    .report-card .rc-stats { display: flex; gap: 10px; font-size: 0.75rem; }
    .report-card .rc-pass { color: #4ade80; }
    .report-card .rc-fail { color: #f87171; }
    .report-card .rc-check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      border: 2px solid #353860;
      border-radius: 4px;
      cursor: pointer;
    }
    .report-card.selected .rc-check { background: #6c7bf0; border-color: #6c7bf0; }
    .report-card .rc-files {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #8890b5;
      border-top: 1px solid rgba(53,56,96,0.4);
      padding-top: 8px;
    }
    .report-card .rc-file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
    }
    .report-card .rc-file-row .badge {
      font-size: 0.6rem;
      padding: 1px 7px;
    }

    /* Report Detail Modal */
    .report-detail-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 20, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .report-detail-overlay.visible { display: flex; }
    .report-detail-modal {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 14px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
    }
    .report-detail-modal h2 {
      font-size: 1.1rem;
      color: #d4d8f0;
      margin-bottom: 6px;
    }
    .report-detail-modal .rd-time { font-size: 0.78rem; color: #8890b5; margin-bottom: 18px; }
    .rd-file-list { list-style: none; }
    .rd-file-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(53, 56, 96, 0.4);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .rd-file-item:last-child { border-bottom: none; }
    .rd-file-name { flex: 1; font-size: 0.86rem; color: #d4d8f0; font-weight: 600; }
    .rd-file-err { font-size: 0.76rem; color: #f87171; margin-top: 4px; font-family: monospace; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .toast-success { background: #1a3a2a; color: #4ade80; border: 1px solid #2a5a3a; }
    .toast-error { background: #3a1a1a; color: #f87171; border: 1px solid #5a2020; }
    .toast-info { background: #222540; color: #6c7bf0; border: 1px solid #353860; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

    /* ── Footer ────────────────────────────────────────────────────────────── */
    .footer {
      background: #1e2040;
      border-top: 1px solid #353860;
      padding: 12px 28px;
      text-align: center;
      font-size: 0.72rem;
      color: #8890b5;
      flex-shrink: 0;
    }

    /* ── Error Summary ─────────────────────────────────────────────────────── */
    .error-summary {
      background: #3a1a1a;
      border: 1px solid #5a2020;
      border-radius: 10px;
      padding: 14px 18px;
      margin: 10px 18px;
      display: none;
    }
    .error-summary.visible { display: block; }
    .error-summary h4 { color: #f87171; font-size: 0.84rem; margin-bottom: 8px; }
    .error-summary ul { list-style: none; }
    .error-summary li {
      padding: 6px 0;
      border-bottom: 1px solid rgba(248,113,113,0.15);
      font-size: 0.78rem;
      color: #fca5a5;
    }
    .error-summary li:last-child { border-bottom: none; }
    .error-summary .err-title { font-weight: 600; color: #f87171; }
    .error-summary .err-msg { color: #d4a0a0; margin-top: 2px; font-family: monospace; font-size: 0.72rem; }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div class="header">
    <div class="header-top">
      <h1>Checkout <span>E2E</span> - Test Dashboard</h1>
      <div class="header-actions">
        <span class="server-status" id="serverStatus"><span class="status-dot offline"></span> Server Offline</span>
        <button class="btn btn-secondary" onclick="doSync()">Sync</button>
        <button class="btn btn-primary" id="runAllHeadedBtn" onclick="runAll('headed')">Run All Headed</button>
        <button class="btn btn-secondary" id="runAllHeadlessBtn" onclick="runAll('headless')">Run All Headless</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTests()" style="display:none;">Stop</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">Test Files</div></div>
      <div class="stat-box"><div class="num" id="statModules">0</div><div class="lbl">Gateways</div></div>
      <div class="stat-box pass"><div class="num" id="statPassed">0</div><div class="lbl">Passed</div></div>
      <div class="stat-box fail"><div class="num" id="statFailed">0</div><div class="lbl">Failed</div></div>
    </div>
  </div>

  <!-- ── Tab Bar ─────────────────────────────────────────────────────────── -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- ── Main Split ──────────────────────────────────────────────────────── -->
  <div class="main-split">
    <div class="left-panel" id="leftPanel"></div>
    <div class="right-panel">
      <div class="log-header">
        <h3>Live Log</h3>
        <button class="btn btn-secondary" style="padding:4px 10px;font-size:0.72rem;" onclick="clearLog()">Clear</button>
      </div>
      <div class="progress-bar-container" id="progressBarContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="error-summary" id="errorSummary">
        <h4>Failed Tests</h4>
        <ul id="errorList"></ul>
      </div>
      <div class="log-body" id="logBody">Waiting for test run...</div>
    </div>
  </div>

  <!-- ── Report Detail Overlay ───────────────────────────────────────────── -->
  <div class="report-detail-overlay" id="reportDetailOverlay" onclick="if(event.target===this)closeReportDetail()">
    <div class="report-detail-modal" id="reportDetailModal"></div>
  </div>

  <!-- ── Toast Container ─────────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <div class="footer" id="footerBar">Checkout E2E Test Cases</div>

<script>

/* ════════════════════════════════════════════════════════════════════════════
   STATUS BADGES — per file
   ════════════════════════════════════════════════════════════════════════════ */
function statusLabel(s) {
  const m = { notrun: 'Not Run', pass: 'Pass', fail: 'Fail', blocked: 'Blocked', skip: 'Skip' };
  return m[s] || 'Not Run';
}

function cycleStatus(el) {
  const key = el.dataset.key;
  let current = localStorage.getItem(key) || 'notrun';
  let idx = STATUS_CYCLE.indexOf(current);
  idx = (idx + 1) % STATUS_CYCLE.length;
  const next = STATUS_CYCLE[idx];
  localStorage.setItem(key, next);
  el.className = 'badge badge-' + next;
  el.textContent = statusLabel(next);
  updateGlobalStats();
}

function setFileStatus(tabId, fi, status) {
  const key = `status:${tabId}-f${fi}`;
  localStorage.setItem(key, status);
  const el = document.querySelector(`[data-key="${key}"]`);
  if (el) {
    el.className = 'badge badge-' + status;
    el.textContent = statusLabel(status);
  }
  // Highlight the row briefly
  const row = document.getElementById(`row-${tabId}-f${fi}`);
  if (row) {
    row.style.transition = 'background 0.4s ease';
    row.style.background = status === 'pass' ? 'rgba(74,222,128,0.08)' : 'rgba(248,113,113,0.08)';
    setTimeout(() => { row.style.background = ''; }, 2000);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   GLOBAL STATS — count file-level statuses
   ════════════════════════════════════════════════════════════════════════════ */
function updateGlobalStats() {
  let passed = 0, failed = 0;
  TABS.forEach(tab => {
    tab.files.forEach((file, fi) => {
      const s = localStorage.getItem(`status:${tab.id}-f${fi}`) || 'notrun';
      if (s === 'pass') passed++;
      if (s === 'fail') failed++;
    });
  });
  document.getElementById('statPassed').textContent = passed;
  document.getElementById('statFailed').textContent = failed;
}

/* ════════════════════════════════════════════════════════════════════════════
   LOG PANEL
   ════════════════════════════════════════════════════════════════════════════ */
function appendLog(msg, cls) {
  const body = document.getElementById('logBody');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  body.appendChild(span);
  body.scrollTop = body.scrollHeight;
}

function clearLog() {
  document.getElementById('logBody').innerHTML = '';
  document.getElementById('errorSummary').classList.remove('visible');
  document.getElementById('progressBarContainer').classList.remove('visible');
}

function setProgress(pct) {
  const container = document.getElementById('progressBarContainer');
  const bar = document.getElementById('progressBar');
  container.classList.add('visible');
  bar.style.width = Math.min(100, pct) + '%';
}

/* ════════════════════════════════════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════════════════════════════════════ */
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info');
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

  const hlBtn = document.getElementById('runAllHeadlessBtn');

/* ════════════════════════════════════════════════════════════════════════════
   RESET ALL FILE STATUSES

function resetAllStatuses() {

  totalRunFailed = 0;

    tab.files.forEach((file, fi) => {

/* ════════════════════════════════════════════════════════════════════════════
   RUN ALL
   ════════════════════════════════════════════════════════════════════════════ */
function runAll(mode) {
  mode = mode || 'headed';
  const btn = document.getElementById(mode === 'headless' ? 'runAllHeadlessBtn' : 'runAllHeadedBtn');
  if (runningSource) {
    showToast('A test run is already in progress', 'error');
    return;
  }
  clearLog();
  resetAllStatuses();
  btn.textContent = 'Running...';
  btn.disabled = true;
  const otherBtn = document.getElementById(mode === 'headless' ? 'runAllHeadedBtn' : 'runAllHeadlessBtn');
  if (otherBtn) otherBtn.disabled = true;
  appendLog(`=== Run All Tests (${mode}) ===`, 'log-bold');
  appendLog('Spec: cypress/e2e/checkout/**/*.cy.js', 'log-info');
  appendLog('', '');

  const spec = 'cypress/e2e/checkout/**/*.cy.js';
  runWithEventSource(spec, null, null, null, btn, mode, true);
}

/* ════════════════════════════════════════════════════════════════════════════
   RUN SINGLE SPEC (file)
   ════════════════════════════════════════════════════════════════════════════ */
function runSpec(spec, tabId, fi, btn, mode) {
  mode = mode || 'headed';
  if (runningSource) {
    showToast('A test run is already in progress', 'error');
    return;
  }
  clearLog();

  // Reset only this file's status
  const key = `status:${tabId}-f${fi}`;
  localStorage.removeItem(key);
  const badgeEl = document.querySelector(`[data-key="${key}"]`);
  if (badgeEl) { badgeEl.className = 'badge badge-notrun'; badgeEl.textContent = 'Not Run'; }

  totalRunPassed = 0;
  totalRunFailed = 0;

  btn.dataset.label = btn.textContent;
  btn.classList.add('running');
  btn.textContent = 'Running...';
  appendLog(`=== Run File (${mode}) ===`, 'log-bold');
  appendLog('Spec: ' + spec, 'log-info');
  appendLog('', '');

  runWithEventSource(spec, tabId, fi, btn, null, mode, false);
}

/* ════════════════════════════════════════════════════════════════════════════
   EVENT SOURCE HANDLER
   ════════════════════════════════════════════════════════════════════════════ */
function runWithEventSource(spec, tabId, fi, fileBtn, globalBtn, mode, isRunAll) {
  mode = mode || 'headed';
  const url = SERVER + '/run?spec=' + encodeURIComponent(spec) + '&mode=' + mode;
  const es = new EventSource(url);
  runningSource = es;
  document.getElementById('stopBtn').style.display = 'inline-flex';
  let specCount = 0;
  let totalSpecs = 0;
  TABS.forEach(t => totalSpecs += t.files.length);
  if (!isRunAll) totalSpecs = 1;

  es.onmessage = function(event) {
    try {
      const data = JSON.parse(event.data);

      if (data.status === 'log') {
        appendLog(data.text || data.message || data.data || '', '');
      }

      if (data.status === 'file-start') {
        appendLog('--- ' + (data.file || data.spec || '') + ' ---', 'log-info');
      }

      if (data.status === 'spec-done') {
        specCount++;
        const sp = data.specPasses || data.pass || 0;
        const sf = data.specFailures || data.fail || 0;
        totalRunPassed += sp;
        totalRunFailed += sf;
        appendLog(`  Passed: ${sp}  Failed: ${sf}  Total: ${data.specTotal || data.total || (sp + sf)}`,
          sf > 0 ? 'log-fail' : 'log-pass');
        setProgress((specCount / totalSpecs) * 100);

        // If this is spec-done during a run-all, try to match and update that file's status immediately
        if (isRunAll && data.spec) {
          const specPath = (data.spec || '').replace(/\\/g, '/');
          TABS.forEach(tab => {
            tab.files.forEach((file, fIdx) => {
              if (specPath.includes(file.spec) || file.spec.includes(specPath) ||
                  specPath.endsWith(file.name) || file.name.endsWith(specPath.split('/').pop())) {
                setFileStatus(tab.id, fIdx, sf > 0 ? 'fail' : 'pass');
              }
            });
          });
          updateGlobalStats();
        }
      }

      if (data.status === 'done') {
        es.close();
        runningSource = null;
        document.getElementById('stopBtn').style.display = 'none';
        setProgress(100);

        const ok = data.ok;
        const report = data.report || {};
        const passes = report.passes || [];
        const failures = report.failures || [];

        appendLog('', '');
        appendLog('=== Run Complete ===', 'log-bold');
        appendLog(`Result: ${ok ? 'PASSED' : 'FAILED'}`, ok ? 'log-pass' : 'log-fail');
        appendLog(`Total Passed: ${passes.length}  Failed: ${failures.length}`, '');

        // Apply results to file status rows
        applyReportToFiles(passes, failures, tabId, fi, isRunAll);

        if (failures.length > 0) {
          showErrorSummary(failures);
        }

        if (fileBtn) {
          fileBtn.classList.remove('running');
          fileBtn.classList.add(ok ? 'done-ok' : 'done-fail');
          fileBtn.textContent = ok ? 'Passed' : 'Failed';
          const origLabel = fileBtn.dataset.label || 'Headed';
          setTimeout(() => {
            fileBtn.classList.remove('done-ok', 'done-fail');
            fileBtn.textContent = origLabel;
          }, 5000);
        }
        if (globalBtn) {
          const origText = globalBtn.id === 'runAllHeadlessBtn' ? 'Run All Headless' : 'Run All Headed';
          globalBtn.textContent = ok ? 'All Passed' : 'Some Failed';
          globalBtn.disabled = false;
          const otherId = globalBtn.id === 'runAllHeadlessBtn' ? 'runAllHeadedBtn' : 'runAllHeadlessBtn';
          const otherBtn = document.getElementById(otherId);
          if (otherBtn) otherBtn.disabled = false;
          setTimeout(() => { globalBtn.textContent = origText; }, 5000);
        }

        updateGlobalStats();
        showToast(ok ? 'All tests passed!' : 'Some tests failed', ok ? 'success' : 'error');
      }
    } catch (e) {
      appendLog(event.data, '');
    }
  };

  es.onerror = function() {
    es.close();
    runningSource = null;
    document.getElementById('stopBtn').style.display = 'none';
    appendLog('Connection lost or error occurred.', 'log-fail');
    if (fileBtn) {
      fileBtn.classList.remove('running');
      fileBtn.classList.add('done-fail');
      fileBtn.textContent = 'Error';
      const origLabel = fileBtn.dataset.label || 'Headed';
      setTimeout(() => {
        fileBtn.classList.remove('done-fail');
        fileBtn.textContent = origLabel;
      }, 5000);
    }
    if (globalBtn) {
      const origText = globalBtn.id === 'runAllHeadlessBtn' ? 'Run All Headless' : 'Run All Headed';
      globalBtn.textContent = origText;
      globalBtn.disabled = false;
      const otherId = globalBtn.id === 'runAllHeadlessBtn' ? 'runAllHeadedBtn' : 'runAllHeadlessBtn';
      const otherBtn = document.getElementById(otherId);
      if (otherBtn) otherBtn.disabled = false;
    }
  };
}

/* ════════════════════════════════════════════════════════════════════════════
   APPLY REPORT TO FILE ROWS
   Matches mochawesome results to files and sets PASS/FAIL per file
   ════════════════════════════════════════════════════════════════════════════ */
function applyReportToFiles(passes, failures, singleTabId, singleFi, isRunAll) {

  // If single file run, just set that file's status
  if (!isRunAll && singleTabId !== null && singleFi !== null) {
    const hasFail = failures.length > 0;
    setFileStatus(singleTabId, singleFi, hasFail ? 'fail' : 'pass');
    updateGlobalStats();
    return;
  }

  // For Run All: group results by spec file path, then match to TABS files
  const fileResults = {};  // specPath → { passed: N, failed: N }

  passes.forEach(p => {
    const fp = (typeof p === 'string' ? '' : (p.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
    if (fp) {
      if (!fileResults[fp]) fileResults[fp] = { passed: 0, failed: 0 };
      fileResults[fp].passed++;
    }
  });
  failures.forEach(f => {
    const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
    if (fp) {
      if (!fileResults[fp]) fileResults[fp] = { passed: 0, failed: 0 };
      fileResults[fp].failed++;
    }
  });

  const resultPaths = Object.keys(fileResults);

  TABS.forEach(tab => {
    tab.files.forEach((file, fi) => {
      const specNorm = file.spec.replace(/\\/g, '/');
      const fileName = specNorm.split('/').pop();

      // Try to match this file to a result path
      let matched = false;
      for (const rp of resultPaths) {
        if (rp.endsWith(specNorm) || specNorm.endsWith(rp) ||
            rp.includes(specNorm) || specNorm.includes(rp) ||
            rp.endsWith(fileName) || rp.includes(fileName)) {
          const r = fileResults[rp];
          setFileStatus(tab.id, fi, r.failed > 0 ? 'fail' : 'pass');
          matched = true;
          break;
        }
      }

      // If no path match, try matching by test title
      if (!matched && file.tests.length > 0) {
        const testTitle = file.tests[0].title.toLowerCase();
        const isPass = passes.some(p => {
          const pt = (typeof p === 'string' ? p : (p.title || '')).toLowerCase();
          return pt === testTitle || pt.includes(testTitle) || testTitle.includes(pt);
        });
        const isFail = failures.some(f => {
          const ft = (typeof f === 'string' ? f : (f.title || '')).toLowerCase();
          return ft === testTitle || ft.includes(testTitle) || testTitle.includes(ft);
        });
        if (isFail) {
          setFileStatus(tab.id, fi, 'fail');
        } else if (isPass) {
          setFileStatus(tab.id, fi, 'pass');
        }
      }
    });
  });
  updateGlobalStats();
}

/* ════════════════════════════════════════════════════════════════════════════
   ERROR SUMMARY
   ════════════════════════════════════════════════════════════════════════════ */
function showErrorSummary(failures) {
  const el = document.getElementById('errorSummary');
  const list = document.getElementById('errorList');
  list.innerHTML = '';
  failures.forEach(f => {
    const li = document.createElement('li');
    // Show the file name (not test title)
    const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
    const fileName = fp ? fp.split('/').pop() : (typeof f === 'string' ? f : (f.title || 'Unknown'));
    li.innerHTML = `<div class="err-title">${escapeHtml(fileName)}</div>` +
      (f.err && f.err.message ? `<div class="err-msg">${escapeHtml(f.err.message)}</div>` : '');
    list.appendChild(li);
  });
  el.classList.add('visible');
}

/* ════════════════════════════════════════════════════════════════════════════
   REPORTS — show file names with Pass/Fail
   ════════════════════════════════════════════════════════════════════════════ */
function loadReports() {
  const grid = document.getElementById('reportsGrid');
  grid.innerHTML = '<span style="color:#8890b5;">Loading reports...</span>';
  selectedReports.clear();

  fetch(SERVER + '/reports')
    .then(r => r.json())
    .then(data => {
      const reports = data.reports || data || [];
      if (!reports.length) {
        grid.innerHTML = '<span style="color:#8890b5;">No reports found.</span>';
        return;
      }
      grid.innerHTML = '';
      reports.forEach((rpt, i) => {
        const card = document.createElement('div');
        card.className = 'report-card';
        card.dataset.file = rpt.file || rpt.name || '';
        card.dataset.index = i;
        const passes = rpt.passes || 0;
        const failures = rpt.failures || 0;
        const title = rpt.file || rpt.name || 'Report ' + (i + 1);
        const time = rpt.time || rpt.date || '';
        const safeFile = (rpt.file || rpt.name || '').replace(/'/g, "\\'");

        // Build file-level result list if available
        let fileListHtml = '';
        if (rpt.detail && (rpt.detail.passes || rpt.detail.failures)) {
          const fileMap = buildFileMapFromDetail(rpt.detail);
          const fnames = Object.keys(fileMap).sort();
          if (fnames.length > 0) {
            fileListHtml = '<div class="rc-files">';
            fnames.forEach(fn => {
              const status = fileMap[fn].failed > 0 ? 'fail' : 'pass';
              fileListHtml += `<div class="rc-file-row">
                <span class="badge badge-${status}">${status === 'pass' ? 'Pass' : 'Fail'}</span>
                <span>${escapeHtml(fn)}</span>
              </div>`;
            });
            fileListHtml += '</div>';
          }
        }

        card.innerHTML = `
          <div class="rc-check" onclick="event.stopPropagation();toggleReportSelect(this.parentElement)"></div>
          <div class="rc-title">${escapeHtml(title)}</div>
          <div class="rc-time">${escapeHtml(time)}</div>
          <div class="rc-stats">
            <span class="rc-pass">${passes} passed</span>
            <span class="rc-fail">${failures} failed</span>
          </div>
          ${fileListHtml}
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn-run" onclick="event.stopPropagation();openReportDetail('${safeFile}')">View Report</button>
            <button class="btn-run-headless" onclick="event.stopPropagation();downloadReportAsPDF('${safeFile}')">PDF</button>
          </div>`;
        grid.appendChild(card);
      });
    })
    .catch(err => {
      grid.innerHTML = `<span style="color:#f87171;">Error loading reports: ${escapeHtml(err.message)}</span>`;
    });
}

function buildFileMapFromDetail(detail) {
  const map = {};
  const passes = Array.isArray(detail.passes) ? detail.passes : [];
  const failures = Array.isArray(detail.failures) ? detail.failures : [];
  passes.forEach(p => {
    const fp = (typeof p === 'string' ? '' : (p.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
    const fn = fp ? fp.split('/').pop() : 'Unknown';
    if (!map[fn]) map[fn] = { passed: 0, failed: 0 };
    map[fn].passed++;
  });
  failures.forEach(f => {
    const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
    const fn = fp ? fp.split('/').pop() : 'Unknown';
    if (!map[fn]) map[fn] = { passed: 0, failed: 0 };
    map[fn].failed++;
  });
  return map;
}

function toggleReportSelect(card) {
  const file = card.dataset.file;
  if (selectedReports.has(file)) {
    selectedReports.delete(file);
    card.classList.remove('selected');
  } else {
    selectedReports.add(file);
    card.classList.add('selected');
  }
}

function deleteSelectedReports() {
  if (selectedReports.size === 0) {
    showToast('No reports selected', 'error');
    return;
  }
  const files = Array.from(selectedReports);
  fetch(SERVER + '/reports/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files })
  })
    .then(r => r.json())
    .then(() => {
      showToast(`Deleted ${files.length} report(s)`, 'success');
      loadReports();
    })
    .catch(err => {
      showToast('Delete failed: ' + err.message, 'error');
    });
}

function downloadSelectedReports() {
  if (selectedReports.size === 0) {
    showToast('No reports selected — downloading all', 'info');
    fetch(SERVER + '/reports')
      .then(r => r.json())
      .then(data => {
        const reports = data.reports || data || [];
        if (!reports.length) { showToast('No reports to download', 'error'); return; }
        reports.forEach(r => downloadReportAsPDF(r.file || r.name || ''));
      })
      .catch(err => showToast('Error: ' + err.message, 'error'));
    return;
  }
  Array.from(selectedReports).forEach(f => downloadReportAsPDF(f));
}

function downloadReportAsPDF(file) {
  if (!window.jspdf) {
    showToast('PDF library loading... try again in a moment', 'error');
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js';
    document.head.appendChild(s);
    return;
  }
  fetch(SERVER + '/reports/get?file=' + encodeURIComponent(file))
    .then(r => r.json())
    .then(data => {
      const detail = data.detail || {};
      const passes = Array.isArray(detail.passes) ? detail.passes
                   : Array.isArray(data.passes) ? data.passes : [];
      const failures = Array.isArray(detail.failures) ? detail.failures
                     : Array.isArray(data.failures) ? data.failures : [];
      const passCount = passes.length || (typeof data.passes === 'number' ? data.passes : 0);
      const failCount = failures.length || (typeof data.failures === 'number' ? data.failures : 0);
      const title = data.label || data.file || data.name || file;
      const time = data.time || data.date || new Date().toISOString();
      const total = passCount + failCount;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      let y = 20;
      const checkPage = (need) => { if (y + need > 275) { doc.addPage(); y = 20; } };

      // Header
      doc.setFillColor(34, 37, 64);
      doc.rect(0, 0, W, 38, 'F');
      doc.setFontSize(18); doc.setTextColor(232, 236, 255);
      doc.text('E2E Test Report', 14, 16);
      doc.setFontSize(9); doc.setTextColor(136, 144, 181);
      doc.text(title, 14, 24);
      doc.text('Generated: ' + time, 14, 30);

      // Stats boxes
      y = 48;
      const boxW = 40, boxH = 20, gap = 8;
      doc.setFillColor(44, 48, 80);
      doc.roundedRect(14, y, boxW, boxH, 3, 3, 'F');
      doc.setFontSize(16); doc.setTextColor(108, 123, 240);
      doc.text('' + total, 34, y + 10, { align: 'center' });
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('TOTAL', 34, y + 16, { align: 'center' });
      doc.setFillColor(26, 58, 42);
      doc.roundedRect(14 + boxW + gap, y, boxW, boxH, 3, 3, 'F');
      doc.setFontSize(16); doc.setTextColor(74, 222, 128);
      doc.text('' + passCount, 14 + boxW + gap + boxW / 2, y + 10, { align: 'center' });
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('PASSED', 14 + boxW + gap + boxW / 2, y + 16, { align: 'center' });
      doc.setFillColor(58, 26, 26);
      doc.roundedRect(14 + (boxW + gap) * 2, y, boxW, boxH, 3, 3, 'F');
      doc.setFontSize(16); doc.setTextColor(248, 113, 113);
      doc.text('' + failCount, 14 + (boxW + gap) * 2 + boxW / 2, y + 10, { align: 'center' });
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('FAILED', 14 + (boxW + gap) * 2 + boxW / 2, y + 16, { align: 'center' });

      // File-level results in PDF
      y = 78;
      const fileMap = {};
      passes.forEach(p => {
        const fp = (typeof p === 'string' ? '' : (p.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fn = fp ? fp.split('/').pop() : 'Unknown';
        if (!fileMap[fn]) fileMap[fn] = { passed: 0, failed: 0, errors: [] };
        fileMap[fn].passed++;
      });
      failures.forEach(f => {
        const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fn = fp ? fp.split('/').pop() : 'Unknown';
        if (!fileMap[fn]) fileMap[fn] = { passed: 0, failed: 0, errors: [] };
        fileMap[fn].failed++;
        if (f.err && f.err.message) fileMap[fn].errors.push(f.err.message);
      });

      const pdfFiles = Object.keys(fileMap).sort();
      if (pdfFiles.length > 0) {
        doc.setFontSize(11); doc.setTextColor(212, 216, 240);
        doc.text('File Results', 14, y);
        y += 8;

        pdfFiles.forEach(fn => {
          const r = fileMap[fn];
          const status = r.failed > 0 ? 'FAIL' : 'PASS';
          checkPage(14);

          // File row background
          doc.setFillColor(status === 'PASS' ? 26 : 58, status === 'PASS' ? 58 : 26, status === 'PASS' ? 42 : 26);
          doc.roundedRect(14, y - 4, W - 28, 10, 2, 2, 'F');

          // Status badge
          doc.setFontSize(7);
          doc.setTextColor(status === 'PASS' ? 74 : 248, status === 'PASS' ? 222 : 113, status === 'PASS' ? 128 : 113);
          doc.text(status, 18, y + 1);

          // File name
          doc.setFontSize(9); doc.setTextColor(212, 216, 240);
          doc.text(fn, 34, y + 1);
          y += 10;

          // Error messages if failed
          if (r.errors.length > 0) {
            r.errors.forEach(err => {
              checkPage(8);
              const errLines = doc.splitTextToSize('Error: ' + err, W - 50);
              doc.setFontSize(6.5); doc.setTextColor(248, 160, 160);
              doc.text(errLines, 36, y);
              y += errLines.length * 4 + 2;
            });
          }
          y += 2;
        });
      } else if (passCount > 0 || failCount > 0) {
        doc.setFontSize(9); doc.setTextColor(136, 144, 181);
        doc.text(passCount + ' passed, ' + failCount + ' failed (file details not available)', 14, y);
        y += 8;
      }

      // Footer
      checkPage(12);
      y += 6;
      doc.setDrawColor(53, 56, 96); doc.setLineWidth(0.2);
      doc.line(14, y, W - 14, y);
      y += 6;
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('Checkout E2E Test Dashboard  |  Auto-generated report', W / 2, y, { align: 'center' });

      const safeName = title.replace(/[^a-zA-Z0-9_\-\.]/g, '_');
      doc.save(safeName + '.pdf');
      showToast('PDF downloaded: ' + title, 'success');
    })
    .catch(err => {
      showToast('PDF failed: ' + err.message, 'error');
    });
}

function openReportDetail(file) {
  const overlay = document.getElementById('reportDetailOverlay');
  const modal = document.getElementById('reportDetailModal');
  modal.innerHTML = '<span style="color:#8890b5;">Loading report detail...</span>';
  overlay.classList.add('visible');

  fetch(SERVER + '/reports/get?file=' + encodeURIComponent(file))
    .then(r => r.json())
    .then(data => {
      const detail = data.detail || {};
      const passes = Array.isArray(detail.passes) ? detail.passes
                   : Array.isArray(data.passes) ? data.passes : [];
      const failures = Array.isArray(detail.failures) ? detail.failures
                     : Array.isArray(data.failures) ? data.failures : [];
      const passCount = passes.length || (typeof data.passes === 'number' ? data.passes : 0);
      const failCount = failures.length || (typeof data.failures === 'number' ? data.failures : 0);
      const title = data.label || data.file || data.name || file;
      const time = data.time || data.date || '';

      // Group by file name
      const fileMap = {};
      passes.forEach(p => {
        const fp = (typeof p === 'string' ? '' : (p.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fn = fp ? fp.split('/').pop() : 'Unknown';
        if (!fileMap[fn]) fileMap[fn] = { status: 'pass', errors: [] };
      });
      failures.forEach(f => {
        const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fn = fp ? fp.split('/').pop() : 'Unknown';
        if (!fileMap[fn]) fileMap[fn] = { status: 'fail', errors: [] };
        fileMap[fn].status = 'fail';
        if (f.err && f.err.message) fileMap[fn].errors.push(f.err.message);
      });

      let html = `<h2>${escapeHtml(title)}</h2>
        <div class="rd-time">${escapeHtml(time)}</div>
        <div style="display:flex;gap:14px;margin-bottom:18px;">
          <span style="color:#4ade80;font-weight:600;font-size:1rem;">${passCount} passed</span>
          <span style="color:#f87171;font-weight:600;font-size:1rem;">${failCount} failed</span>
          <span style="color:#6c7bf0;font-weight:600;font-size:1rem;">${passCount + failCount} total</span>
        </div>`;

      const fileNames = Object.keys(fileMap).sort();
      if (fileNames.length > 0) {
        html += `<ul class="rd-file-list">`;
        fileNames.forEach(fn => {
          const r = fileMap[fn];
          html += `<li class="rd-file-item" style="flex-direction:column;align-items:flex-start;">
            <div style="display:flex;align-items:center;gap:12px;width:100%;">
              <span class="badge badge-${r.status}">${r.status === 'pass' ? 'Pass' : 'Fail'}</span>
              <span class="rd-file-name">${escapeHtml(fn)}</span>
            </div>`;
          if (r.errors.length > 0) {
            r.errors.forEach(err => {
              html += `<div class="rd-file-err" style="margin-left:60px;margin-top:6px;">${escapeHtml(err)}</div>`;
            });
          }
          html += `</li>`;
        });
        html += `</ul>`;
      } else {
        html += `<div style="color:#8890b5;padding:12px;">No file details available (${passCount} passed, ${failCount} failed)</div>`;
      }

      html += `
        <div style="text-align:right;margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn btn-primary" onclick="downloadReportAsPDF('${escapeHtml(file)}')">&#11015; Download PDF</button>
          <button class="btn btn-secondary" onclick="closeReportDetail()">Close</button>
        </div>`;
      modal.innerHTML = html;
    })
    .catch(err => {
      modal.innerHTML = `<span style="color:#f87171;">Error: ${escapeHtml(err.message)}</span>
        <div style="text-align:right;margin-top:16px;">
          <button class="btn btn-secondary" onclick="closeReportDetail()">Close</button>
        </div>`;
    });
}

function closeReportDetail() {
  document.getElementById('reportDetailOverlay').classList.remove('visible');
}

/* ════════════════════════════════════════════════════════════════════════════
   UTILS
   ════════════════════════════════════════════════════════════════════════════ */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

/* ════════════════════════════════════════════════════════════════════════════
   SERVER STATUS PING
   ════════════════════════════════════════════════════════════════════════════ */
function checkServerStatus() {
  const el = document.getElementById('serverStatus');
  fetch(SERVER + '/ping', { signal: AbortSignal.timeout(3000) })
    .then(r => {
      el.className = 'server-status online';
      el.innerHTML = '<span class="status-dot online"></span> Server Online';
    })
    .catch(() => {
      el.className = 'server-status offline';
      el.innerHTML = '<span class="status-dot offline"></span> Server Offline';
    });
}
checkServerStatus();
setInterval(checkServerStatus, 10000);
